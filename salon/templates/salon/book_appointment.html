{% extends "salon/base.html" %}
{% block content %}
<h2>Book an Appointment</h2>
<p style="color:#8a8181;">Choose a service, pick your preferred date and time, and we'll confirm shortly.</p>
<form method="post" class="styled">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Request Appointment</button>
</form>
{% endblock %}
