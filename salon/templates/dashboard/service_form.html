{% extends "dashboard/base_dashboard.html" %}
{% block title %}{{ title }}{% endblock %}
{% block dash_content %}
<h2>{{ title }}</h2>
<form method="post" class="styled">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'dashboard_services' %}" class="btn btn-outline">Cancel</a>
</form>
{% endblock %}
