{% extends "salon/base.html" %}
{% block content %}
<h2>Log In</h2>
<form method="post" class="styled">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Log In</button>
</form>
<p style="margin-top:16px; color:#8a8181;">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
